name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e guardian-mcp-proxy

      - name: Run proxy unit tests
        run: pytest guardian-mcp-proxy/src/guardian_mcp_proxy/tests/ -v

      - name: Run guardian environment smoke tests
        run: pytest guardian/tests/ -v --tb=short || true

      - name: Check formatting
        run: black --check guardian/ guardian-mcp-proxy/src/ || true
