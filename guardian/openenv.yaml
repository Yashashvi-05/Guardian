name: guardian-env
version: "0.4.0"
description: >
  GUARDIAN Fleet — Universal AI Immune System. Multi-agent RL environment training
  a Guardian LLM (Qwen2.5-7B via GRPO) to detect and intercept 11 adversarial attack
  types across 3 enterprise domains via an MCP Security Gateway. Features the
  Semantic Action Abstraction Layer for Zero-Shot Domain Transfer — Guardian
  generalizes to unseen domains without retraining using [STATE_MOD|PRIV_ESC|EXT_COMM|FINANCIAL]
  universal primitives.

author: "GUARDIAN Team"
license: "MIT"

entry_point: guardian.environment.openenv_wrapper:GUARDIANGymEnv

skills:
  - read_db
  - write_db
  - process_payment
  - modify_firewall
  - post_to_forum
  - modify_iam_policy
  - query_data_access_log

metadata:
  render_modes: ["ansi", "human"]
  max_episode_steps: 60
  reward_threshold: 0.85
  reward_components: 12
  difficulty_levels: [1, 2, 3]
  domains:
    - enterprise          # Training domain (HR/Finance)
    - finops              # Zero-shot domain (Algo Trading)
    - corporate_governance # Zero-shot domain (Board/Governance)
  semantic_abstraction_primitives:
    - STATE_MOD
    - PRIV_ESC
    - EXT_COMM
    - FINANCIAL
  attack_types:
    - authority_spoofing
    - prompt_injection
    - approval_bypass
    - data_exfiltration
    - confused_deputy
    - approval_laundering
    - salami_slicing
    - schema_drift_exploit
    - rogue_internal_ai
    - delayed_exfiltration
    - social_engineering
  interventions:
    - allow
    - rewrite
    - shadow
    - interrogate
    - reduce_privs
    - require_justification
    - quarantine_tool
    - quarantine_agent
    - rollback_k
    - emergency_fork
    - canary_inject
    - escalate_human
  stealth_levels: [1, 2, 3]
  sub_themes:
    - Fleet AI (Scalable Oversight)
    - Halluminate (Multi-Actor)
    - Scale AI (Enterprise Workflows)
    - Snorkel AI (Experts-in-the-Loop)
    - Mercor (Token-scaled rewards)
    - Patronus AI (Schema Drift)

tags:
  - multi-agent
  - mcp-gateway
  - enterprise-security
  - scalable-oversight
  - adversarial-rl
  - fleet-ai
  - mcp-proxy
  - zero-shot-transfer
  - semantic-abstraction
  - grpo
  - self-improving
  - long-horizon
